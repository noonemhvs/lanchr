services:
  - type: web
    name: lanchr-backend
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: PORT
        value: 3000
      - key: JWT_SECRET
        generateValue: true
      - key: SESSION_TTL
        value: 86400
      - key: DB_FILE
        value: /opt/render/project/data/db.sqlite
